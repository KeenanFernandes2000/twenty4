# Local dev infra for twenty4 (parity stack — also used by integration tests).
# NOTE: not run in the build environment; kept correct for other devs.
#   docker compose -f docker-compose.dev.yml up -d
services:
  postgres:
    image: postgres:16
    container_name: twenty4-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: twenty4
      POSTGRES_USER: twenty4
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    # citext is shipped with postgres:16 (contrib) — enabled per-db via
    #   CREATE EXTENSION IF NOT EXISTS citext;  (run in migrations).
    command: ["postgres", "-c", "max_connections=200"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twenty4 -d twenty4"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: twenty4-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    container_name: twenty4-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: wait for MinIO, then create the raw/montages/thumbnails buckets.
  minio-init:
    image: minio/mc
    container_name: twenty4-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/raw &&
      mc mb --ignore-existing local/montages &&
      mc mb --ignore-existing local/thumbnails &&
      echo 'twenty4: buckets ready (raw, montages, thumbnails)'
      "

volumes:
  pgdata:
  redisdata:
  miniodata:
